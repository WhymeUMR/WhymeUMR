name: Generate Snake Animation
 
on:
  schedule:
    - cron: "0 */12 * * *"   # каждые 12 часов
  workflow_dispatch:           # запуск вручную из Actions
 
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: WhymeUMR
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=9d4edd&color_dots[]=0d0d14&color_dots[]=3b0764&color_dots[]=7c3aed&color_dots[]=9d4edd&color_dots[]=c4b5fd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
